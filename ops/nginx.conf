# /etc/nginx/sites-available/id3a
#
# After running deploy.sh + certbot, certbot --nginx will auto-rewrite this to
# add the listen 443 ssl block and an HTTP→HTTPS redirect. The HTTP-only
# starting state is enough for the initial Let's Encrypt challenge.

server {
    listen 80;
    listen [::]:80;
    server_name id3a.fun www.id3a.fun;

    client_max_body_size 16M;

    root /var/www/id3a/client/dist;
    index index.html;

    # Let's Encrypt challenge files (live during cert issuance + renewal).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API + render queue + auth — proxied to the Node process.
    # `^~` keeps API URLs out of the *.jpg/png/wav/mp3 regex below
    # (the share viewer's poster.jpg endpoint was 404'ing without this).
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Renders take minutes; keep the connection alive.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # No buffering — needed for any future SSE + cleaner range responses.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Voice + music sample static files (served by Express via express.static).
    # `^~` prefix forces these to win over the regex asset-cache block below
    # (otherwise *.wav / *.mp3 inside /voices and /music-samples would be
    # served by the SPA root, which 404s).
    location ^~ /voices/         { proxy_pass http://127.0.0.1:4000; proxy_set_header Host $host; }
    location ^~ /music-samples/  { proxy_pass http://127.0.0.1:4000; proxy_set_header Host $host; }

    # Everything else is the React SPA (including /v/:slug share viewer
    # and /project/:id editor). History fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets, but not index.html.
    location ~* \.(?:js|css|woff2|svg|jpg|jpeg|png|webp|mp4|wav|mp3)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
